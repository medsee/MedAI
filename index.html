<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med AI - Tibbiy Yordamchi</title>
    <style>
        /* CSS - DIZAYN QISMI */
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f7f6;
            --chat-bg: #ffffff;
            --user-msg-bg: #007bff;
            --ai-msg-bg: #e9ecef;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--chat-bg);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .chat-header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .chat-header img {
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            padding: 2px;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background-color: var(--ai-msg-bg);
            color: #333;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
            background: white;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Yozmoqda animatsiyasi */
        .typing-indicator {
            display: none;
            font-size: 12px;
            color: #888;
            margin-left: 10px;
            margin-bottom: 10px;
        }
        
        .typing-dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: #888;
            animation: typing 1.4s infinite ease-in-out both;
            margin: 0 2px;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <!-- AI ikonka -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"></path><path d="M12 18a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-2a2 2 0 0 1 2-2z"></path><path d="M2 12a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2 2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"></path><path d="M18 12a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        Med AI Assistant
    </div>
    
    <div class="chat-box" id="chatBox">
        <div class="message ai-message">
            Assalomu alaykum! Men Med AI. Sizga qanday tibbiy yordam kerak? Masalan: "Boshim og'riydi" yoki "Isitmam bor".
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        Med AI yozmoqda <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Savolingizni yozing..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()">Yuborish</button>
    </div>
</div>

<script>
    // JAVASCRIPT - MANTIQ QISMI

    // Oddiy ma'lumotlar bazasi (Haqiqiy AI uchun API kerak bo'ladi)
    const medicalData = {
        "boshim og'riydi": "Bosh og'rig'i stress, charchoq yoki suvsizlikdan bo'lishi mumkin. Dam oling, suv iching. Agar kuchli bo'lsa, shifokorga ko'ring.",
        "tishim og'riydi": "Tish og'rig'i yallig'lanish belgisi bo'lishi mumkin. Ilg'or shifokorga ko'rinish tavsiya etiladi. Hozircha og'riqsizlantiruvchi ichishingiz mumkin.",
        "qornim og'riydi": "Qorin og'rig'i turli sabablarga ko'ra bo'ladi. Issiq narsa ichmang, yengil ovqat yeying. Agar keskin og'riq bo'lsa, tez yordam chaqiring.",
        "isitma": "Tana harorati ko'tarilgan bo'lsa, ko'proq suv iching va dam oling. 38.5 dan oshsa, isitmani tushiruvchi dori ichish mumkin.",
        "yo'tal": "Yo'tal shamollash belgisi bo'lishi mumkin. Ilg'or suyuqlik iching va havoni namlantiring.",
        "salom": "Assalomu alaykum! Tibbiy masalada yordam bera olaman.",
        "rahmat": "Arzimaydi! Sog' bo'ling."
    };

    function sendMessage() {
        const inputField = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const typingIndicator = document.getElementById('typingIndicator');
        
        let text = inputField.value.trim();
        if (text === "") return;

        // 1. Foydalanuvchi xabarini chiqarish
        appendMessage(text, 'user-message');
        inputField.value = '';

        // 2. AI yozmoqda animatsiyasini ko'rsatish
        typingIndicator.style.display = 'block';
        chatBox.scrollTop = chatBox.scrollHeight;

        // 3. Javobni tayyorlash (Biroz kutish - realistik effekt uchun)
        setTimeout(() => {
            let response = "Kechirasiz, men bu savolga aniq javob bera olmayman. Iltimos, shifokorga murojaat qiling.";
            
            // Oddiy qidiruv (kalit so'zlar bo'yicha)
            text = text.toLowerCase();
            for (let key in medicalData) {
                if (text.includes(key)) {
                    response = medicalData[key];
                    break;
                }
            }

            typingIndicator.style.display = 'none';
            appendMessage(response, 'ai-message');
        }, 1000 + Math.random() * 1000); // 1-2 soniya ichida javob beradi
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', className);
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleEnter(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }
</script>

</body>
</html>
